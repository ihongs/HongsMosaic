<h2 class="hide">查看站点</h2>
<div id="centra-mosaic-site-review" class="centra-mosaic-site-review review-info board-end">
    <form action="" onsubmit="return false"
          method="POST" enctype="multipart/form-data" class="form-horizontal">
        <div class="rollbox panel panel-default">
        <div class="form-body">
        <div class="form-group row" data-name="id">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">ID</label>
                <div class="col-xs-9 col-md-8">
                <div class="form-control-static" data-fn="id" data-ft="_review"></div>
                <div class="help-block text-muted form-control-static"></div>
                </div>
            </div>
        <div class="form-group row" data-name="name">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">名称</label>
                <div class="col-xs-9 col-md-8">
                <div class="form-control-static" data-fn="name" data-ft="_review"></div>
                <div class="help-block text-muted form-control-static">与短信无关, 仅用于区别任务</div>
                </div>
            </div>
        <div class="form-group row" data-name="note">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">备注</label>
                <div class="col-xs-9 col-md-8">
                <div class="form-control-static _text" data-fn="note" data-ft="_text"></div>
                    <div class="help-block text-muted form-control-static">与短信无关, 仅用于任务备注</div>
                </div>
            </div>
        <div class="form-group row" data-name="temp_id">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">模板</label>
                <div class="col-xs-9 col-md-8">
                <ul class="pickbox pickrol" data-fn="temp_id" data-ft="_fork" data-ak="temp" data-tk="name" data-vk="id" data-href="" data-target="@"></ul>
                    <button type="button" data-toggle="hsFork" class="hide"></button>
                <div class="help-block text-muted form-control-static"></div>
                </div>
            </div>
        <div class="form-group row" data-name="temp.head">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">签名</label>
                <div class="col-xs-9 col-md-8">
                <div class="form-control-static" data-fn="temp.head" data-ft="_review"></div>
                <div class="help-block text-muted form-control-static"></div>
                </div>
            </div>
        <div class="form-group row" data-name="temp.body">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">内容</label>
                <div class="col-xs-9 col-md-8">
                <div class="form-control-static _text" data-fn="temp.body" data-ft="_text"></div>
                    <div class="help-block text-muted form-control-static"></div>
                </div>
            </div>
        <div class="form-group row" data-name="temp.alley_text">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">通道</label>
                <div class="col-xs-9 col-md-8">
                <div class="form-control-static" data-fn="temp.alley_text" data-ft="_review"></div>
                <div class="help-block text-muted form-control-static"></div>
                </div>
            </div>
        <div class="form-group row" data-name="state">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">状态</label>
                <div class="col-xs-9 col-md-8">
                <div class="form-control-static" data-fn="state_text" data-ft="_review"></div>
                <div class="help-block text-muted form-control-static"></div>
                </div>
            </div>
        <div class="form-group row" data-name="count">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">进度</label>
                <div class="col-xs-9 col-md-8">
                <div class="form-control-static" data-fn="count" data-ft="_review"></div>
                <div class="help-block text-muted form-control-static"></div>
                </div>
            </div>
        <div class="form-group row" data-name="stime">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">计划时间</label>
                <div class="col-xs-9 col-md-8">
                <div class="form-control-static" data-fn="stime" data-ft="_datetime" data-fl="!v?v:v*1000" data-format="yyyy/MM/dd HH:mm"></div>
                <div class="help-block text-muted form-control-static"></div>
                </div>
            </div>
        <div class="form-group row" data-name="mtime">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">修改时间</label>
                <div class="col-xs-9 col-md-8">
                <div class="form-control-static" data-fn="mtime" data-ft="_datetime" data-fl="!v?v:v*1000"></div>
                <div class="help-block text-muted form-control-static"></div>
                </div>
            </div>
        <div class="form-group row" data-name="ctime">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">创建时间</label>
                <div class="col-xs-9 col-md-8">
                <div class="form-control-static" data-fn="ctime" data-ft="_datetime" data-fl="!v?v:v*1000"></div>
                <div class="help-block text-muted form-control-static"></div>
                </div>
            </div>
        <div class="form-group row" data-name="cuser">
                <label class="col-xs-3 col-md-2 text-right control-label form-control-static">创建用户</label>
                <div class="col-xs-9 col-md-8">
                <ul class="pickbox pickrol" data-fn="cuser." data-ft="_fork" data-ak="cuser" data-tk="name" data-vk="id" data-href="" data-target="@"></ul>
                    <button type="button" data-toggle="hsFork" class="hide"></button>
                <div class="help-block text-muted form-control-static"></div>
                </div>
            </div>
        <hr/><!-- 兼容占位 -->
        </div><!-- end form-body -->
        </div><!-- end panel -->
        <div class="form-foot">
            <div class="form-group row">
                <div class="col-xs-9 col-md-8 col-xs-offset-3 col-md-offset-2">
                    <div class="btn-toolbar">
                        <button type="button" class="cancel btn btn-default">返回</button>
                    </div>
                </div>
            </div>
            <br/><!-- 兼容占位 -->
        </div><!-- end form-foot -->
    </form>
    <div class="pagebox"></div>
</div>
<script type="text/javascript">
(function($) {
    var context = H$("#centra-mosaic-site-review");
    var loadbox = context.closest( ".loadbox" );
    var formbox = context.find("form").first( );

    var loadres = hsSerialDic(loadbox);
    var denycss = loadres['.deny'];
        delete    loadres['.deny'];

    var formobj = context.hsForm({
        _url : "centra/mosaic/site/search.act?ab=_text,_fork,.fall",
        _delete_act: "centra/mosaic/site/delete.act",
        _delete_msg: "您确定要删除这个(些)短信群发？",
        _data: loadres,
        _fill__fork: hsFormFillFork,
        _fill__file: hsFormFillFile,
        _fill__view: hsFormFillView
    });

    // 修改删除快捷操作
    context.on("click", ".update", function() {
        var url = formobj._update_url;
        var dat = {
                id: H$("?id", loadres)
            };
        var bak = function() {
                $(this).on("saveBack", function(evt, rst, obj) {
                    formbox.trigger(evt, rst, obj); // 继续外传事件
                    if (evt.isDefaultPrevented( )) return;
                    var url = loadbox.data("href");
                    var dat = loadbox.data("data");
                    loadbox.hsLoad (url, dat,/**/);
                });
            };
        loadbox.hsFind("@").hsOpen (url, dat, bak);
    });
    context.on("click", ".delete", function() {
        var btn = this;
        var msg = formobj._delete_msg;
        var url = formobj._delete_act;
        var dat = {
                id: H$("?id", loadres)
            };
        hsSendWithMemo.call(formobj, btn, msg, url, dat);
    });
    

    hsRequires("centra/mosaic/site/defines.js", function() {
        // 外部定制
        Promise.resolve(window["in_centra_data_edm_sms_task_v2_info"] && window["in_centra_data_edm_sms_task_v2_info"](context, formobj))
               .then(function() {

        // 权限控制
        $.each({"update":".update", "delete":".delete"}
        , function(k, v) {
            if (! hsChkUri("centra/mosaic/site/"+k+".act")) {
                context.find(v).remove();
            }
        });
        // 外部限制
        $.each(denycss ? denycss.split(",") : []
        , function(i, n) {
            if (/^form\./.test(n)) {
                n = ".form-group[data-name='"+n.substring(5)+"']";
                formbox.find(n).remove();
            } else {
                context.find(n).remove();
            }
        });

        // 自适滚动
        hsFlexRoll(formbox.children(".rollbox"), $("#main-context"));

        // 特殊控件
        setInfoItems(formbox, loadbox);

        // 加载数据
        formobj.load();

        }); // End Promise
    });
})(jQuery);
</script>
